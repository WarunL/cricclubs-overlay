<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>CricClubs Live Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    #card {
      position: absolute;
      bottom: 30px;
      right: 30px;
      width: 460px;
      background: rgba(10, 10, 10, 0.92);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      border: 1.5px solid rgba(255,255,255,0.12);
    }

    #header {
      background: linear-gradient(90deg, #1a6b1a, #0d3d0d);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header .left {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.4px;
    }

    #header .left::before { content: '🏏 '; }

    #header .right {
      font-size: 11px;
      color: rgba(255,255,255,0.68);
    }

    #countdown { color: #7dff7d; font-weight: 700; }

    #match-title {
      background: rgba(255,255,255,0.05);
      padding: 7px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.58);
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      gap: 8px;
    }

    .team-row.batting { background: rgba(255,255,255,0.04); }

    .team-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team-row.batting .team-name,
    .team-row.batting .team-score { color: #7dff7d; }

    .team-score {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      white-space: nowrap;
    }

    .team-overs {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }

    .live-badge {
      background: #e53935;
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #batsmen-section {
      padding: 8px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .section-label {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 5px;
    }

    .batsman-row, .bowler-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      gap: 10px;
    }

    .batsman-name, .bowler-name {
      font-size: 12px;
      color: #ccc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 220px;
    }

    .batsman-name.strike {
      color: #fff;
      font-weight: 700;
    }

    .batsman-name.strike::after {
      content: ' *';
      color: #7dff7d;
    }

    .batsman-stat, .bowler-stat {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
      flex-shrink: 0;
    }

    #bowler-section { padding: 8px 16px; }

    #status {
      padding: 12px 16px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      display: none;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    #status.error {
      color: #ff9b9b;
      background: rgba(255, 80, 80, 0.08);
    }

    #debug {
      display: none;
      padding: 8px 14px 10px;
      font-size: 10px;
      line-height: 1.4;
      color: rgba(255,255,255,0.68);
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      word-break: break-word;
    }

    #last-updated {
      padding: 4px 14px 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      text-align: right;
    }
  </style>
</head>
<body>
<div id="card">
  <div id="header">
    <span class="left">LIVE SCORECARD</span>
    <span class="right">Refreshing in <span id="countdown">30</span>s</span>
  </div>

  <div id="match-title">Loading match...</div>
  <div id="status">Fetching scores...</div>
  <div id="debug"></div>

  <div class="team-row" id="team1-row">
    <span class="team-name" id="team1-name">—</span>
    <span class="team-score" id="team1-score">—</span>
    <span class="team-overs" id="team1-overs"></span>
  </div>

  <div class="team-row" id="team2-row">
    <span class="team-name" id="team2-name">—</span>
    <span class="team-score" id="team2-score">—</span>
    <span class="team-overs" id="team2-overs"></span>
    <span id="live-badge"></span>
  </div>

  <div id="batsmen-section">
    <div class="section-label">At the crease</div>
    <div class="batsman-row">
      <span class="batsman-name strike" id="b1-name">—</span>
      <span class="batsman-stat" id="b1-stat"></span>
    </div>
    <div class="batsman-row">
      <span class="batsman-name" id="b2-name">—</span>
      <span class="batsman-stat" id="b2-stat"></span>
    </div>
  </div>

  <div id="bowler-section">
    <div class="section-label">Bowling</div>
    <div class="bowler-row">
      <span class="bowler-name" id="bowler-name">—</span>
      <span class="bowler-stat" id="bowler-stat"></span>
    </div>
  </div>

  <div id="last-updated"></div>
</div>

<script>
  const CRICCLUBS_URL = 'https://cricclubs.com/vlccl/viewScorecard.do?matchId=8023&clubId=146';
  const REFRESH_SECONDS = 30;
  const DEBUG = true;

  const PROXIES = [
    (target) => `https://r.jina.ai/http://${target.replace(/^https?:\/\//, '')}`
  ];

  const $ = id => document.getElementById(id);
  const countdown  = $('countdown');
  const matchTitle = $('match-title');
  const statusEl   = $('status');
  const debugEl    = $('debug');
  const team1Row   = $('team1-row');
  const team2Row   = $('team2-row');
  const liveBadge  = $('live-badge');

  let secondsLeft = REFRESH_SECONDS;

  function cleanText(str) {
    return (str || '').replace(/\s+/g, ' ').trim();
  }

  function clean(el) {
    return el ? cleanText(el.textContent) : '';
  }

  function showStatus(text, isError = false) {
    statusEl.textContent = text;
    statusEl.className = isError ? 'error' : '';
    statusEl.style.display = 'block';
  }

  function hideStatus() {
    statusEl.style.display = 'none';
  }

  function showDebug(lines) {
    if (!DEBUG) return;
    debugEl.style.display = 'block';
    debugEl.innerHTML = lines.map(x =>
      String(x)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;')
    ).join('<br/>');
  }

  function resetFields() {
    $('team1-name').textContent = '—';
    $('team1-score').textContent = '—';
    $('team1-overs').textContent = '';
    $('team2-name').textContent = '—';
    $('team2-score').textContent = '—';
    $('team2-overs').textContent = '';
    $('b1-name').textContent = '—';
    $('b1-stat').textContent = '';
    $('b2-name').textContent = '—';
    $('b2-stat').textContent = '';
    $('bowler-name').textContent = '—';
    $('bowler-stat').textContent = '';
    liveBadge.innerHTML = '';
    team1Row.classList.remove('batting');
    team2Row.classList.remove('batting');
  }

  async function fetchText(url, modeLabel) {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`${modeLabel}: HTTP ${res.status}`);
    const text = await res.text();
    if (!text || text.trim().length < 100) {
      throw new Error(`${modeLabel}: empty/short response`);
    }
    return text;
  }

  function parseScorecard(doc) {
    const result = {
      title: 'VLCCL Match',
      team1Name: 'Team 1',
      team1Score: '—',
      team1Overs: '',
      team2Name: 'Team 2',
      team2Score: '—',
      team2Overs: '',
      batsmen: [],
      bowler: null
    };

    const inningsLis = [...doc.querySelectorAll('.schedule-logo ul.list-inline > li')]
      .filter(li => li.querySelector('.teamName'));

    if (inningsLis.length >= 2) {
      const first = inningsLis[0];
      const second = inningsLis[1];

      const firstTeam = first.querySelector('.teamName');
      const secondTeam = second.querySelector('.teamName');

      const firstSpans = [...first.querySelectorAll('span')].map(cleanText).filter(Boolean);
      const secondSpans = [...second.querySelectorAll('span')].map(cleanText).filter(Boolean);

      const firstScore = firstSpans.find(x => /^\d{1,3}\/\d{1,2}$/.test(x));
      const secondScore = secondSpans.find(x => /^\d{1,3}\/\d{1,2}$/.test(x));

      const firstP = first.querySelector('p');
      const secondP = second.querySelector('p');

      result.team1Name = clean(firstTeam) || 'Team 1';
      result.team1Score = firstScore || '—';
      result.team1Overs = clean(firstP) ? `(${clean(firstP)})` : '';

      result.team2Name = clean(secondTeam) || 'Team 2';
      result.team2Score = secondScore || '—';
      result.team2Overs = clean(secondP) ? `(${clean(secondP)})` : '';
    }

    const tables = [...doc.querySelectorAll('.about-table table')];

    for (const table of tables) {
      const firstHeader = clean(table.querySelector('thead th'));
      const rows = [...table.querySelectorAll('tbody tr')]
        .filter(tr => tr.querySelectorAll('th,td').length >= 6);

      if (/^Batter$/i.test(firstHeader)) {
        for (const row of rows) {
          const cells = [...row.querySelectorAll('th, td')].map(el => clean(el));
          if (!cells[0]) continue;

          result.batsmen.push({
            name: cells[0],
            stat: `${cells[1]}(${cells[2]})`
          });

          if (result.batsmen.length >= 2) break;
        }
      }

      if (/^Bowler$/i.test(firstHeader) && rows.length > 0) {
        const cells = [...rows[0].querySelectorAll('th, td')].map(el => clean(el));
        if (cells[0]) {
          result.bowler = {
            name: cells[0],
            stat: `${cells[1]}-${cells[2]}-${cells[3]}-${cells[4]}`
          };
        }
      }
    }

    return result;
  }

  function applyParsedData(parsed) {
    matchTitle.textContent = parsed.title || 'VLCCL Match';

    $('team1-name').textContent = parsed.team1Name || 'Team 1';
    $('team1-score').textContent = parsed.team1Score || '—';
    $('team1-overs').textContent = parsed.team1Overs || '';

    $('team2-name').textContent = parsed.team2Name || 'Team 2';
    $('team2-score').textContent = parsed.team2Score || '—';
    $('team2-overs').textContent = parsed.team2Overs || '';

    team1Row.classList.add('batting');
    team2Row.classList.remove('batting');
    liveBadge.innerHTML = '<span class="live-badge">LIVE</span>';

    if (parsed.batsmen[0]) {
      $('b1-name').textContent = parsed.batsmen[0].name;
      $('b1-stat').textContent = parsed.batsmen[0].stat;
    }

    if (parsed.batsmen[1]) {
      $('b2-name').textContent = parsed.batsmen[1].name;
      $('b2-stat').textContent = parsed.batsmen[1].stat;
    }

    if (parsed.bowler) {
      $('bowler-name').textContent = parsed.bowler.name;
      $('bowler-stat').textContent = parsed.bowler.stat;
    }
  }

  async function fetchScores() {
    const debugLines = [];
    try {
      resetFields();
      showStatus('Fetching scores...');
      debugLines.push(`Start: ${new Date().toLocaleTimeString()}`);
      debugLines.push(`Match URL: ${CRICCLUBS_URL}`);

      let lastError = null;

      for (let i = 0; i < PROXIES.length; i++) {
        try {
          const proxyUrl = `${PROXIES[i](CRICCLUBS_URL)}?_t=${Date.now()}`;
          debugLines.push(`Trying proxy ${i + 1}: ${proxyUrl}`);

          const contents = await fetchText(proxyUrl, `Proxy ${i + 1}`);
          debugLines.push(`Proxy ${i + 1}: response length ${contents.length}`);

          const doc = new DOMParser().parseFromString(contents, 'text/html');
          const parsed = parseScorecard(doc);

          debugLines.push(`Parsed: ${parsed.team1Name} ${parsed.team1Score} vs ${parsed.team2Name} ${parsed.team2Score}`);
          debugLines.push(`Batsmen parsed: ${parsed.batsmen.length}`);
          debugLines.push(`Bowler parsed: ${parsed.bowler ? 'yes' : 'no'}`);

          if (
            (!parsed.team1Score || parsed.team1Score === '—') &&
            (!parsed.team2Score || parsed.team2Score === '—')
          ) {
            throw new Error(`Proxy ${i + 1}: fetched HTML but could not extract score`);
          }

          applyParsedData(parsed);
          hideStatus();
          showDebug([...debugLines, `Success mode: proxy ${i + 1}`]);
          $('last-updated').textContent =
            'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          return;

        } catch (err) {
          lastError = err;
          debugLines.push(`Proxy ${i + 1} failed: ${err.message}`);
        }
      }

      throw lastError || new Error('All fetch modes failed');

    } catch (err) {
      console.error(err);
      showStatus(`⚠️ ${err.message || 'Unknown error'}`, true);
      showDebug(debugLines.concat([`Final error: ${err.message || 'Unknown error'}`]));
      $('last-updated').textContent =
        'Failed at ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
  }

  fetchScores();

  setInterval(() => {
    secondsLeft -= 1;
    countdown.textContent = secondsLeft;
    if (secondsLeft <= 0) {
      secondsLeft = REFRESH_SECONDS;
      countdown.textContent = secondsLeft;
      fetchScores();
    }
  }, 1000);
</script>
</body>
</html>
