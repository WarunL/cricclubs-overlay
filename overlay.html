<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>CricClubs Live Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px; height: 1080px;
      overflow: hidden; background: transparent;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #card {
      position: absolute; bottom: 30px; right: 30px; width: 460px;
      background: rgba(10,10,10,0.92); border-radius: 12px; overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      border: 1.5px solid rgba(255,255,255,0.12);
    }
    #header {
      background: linear-gradient(90deg, #1a6b1a, #0d3d0d);
      padding: 8px 14px; display: flex;
      align-items: center; justify-content: space-between;
    }
    #header .left { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.4px; }
    #header .left::before { content: '🏏 '; }
    #header .right { font-size: 11px; color: rgba(255,255,255,0.6); }
    #countdown { color: #7dff7d; font-weight: 700; }
    #match-title {
      background: rgba(255,255,255,0.05); padding: 7px 14px;
      font-size: 12px; color: rgba(255,255,255,0.55); text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .team-row {
      display: flex; align-items: center; padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07); gap: 8px;
    }
    .team-row.batting { background: rgba(255,255,255,0.04); }
    .team-name { font-size: 14px; font-weight: 700; color: #fff; flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-row.batting .team-name { color: #7dff7d; }
    .team-score { font-size: 20px; font-weight: 800; color: #fff; white-space: nowrap; }
    .team-row.batting .team-score { color: #7dff7d; }
    .team-overs { font-size: 11px; color: rgba(255,255,255,0.45); white-space: nowrap; }
    .live-badge {
      background: #e53935; color: #fff; font-size: 9px; font-weight: 800;
      padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #batsmen-section { padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .section-label { font-size: 10px; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
    .batsman-row { display: flex; justify-content: space-between; padding: 2px 0; }
    .batsman-name { font-size: 12px; color: #ccc; }
    .batsman-name.strike { color: #fff; font-weight: 700; }
    .batsman-name.strike::after { content: ' *'; color: #7dff7d; }
    .batsman-stat { font-size: 12px; color: rgba(255,255,255,0.5); }
    #bowler-section { padding: 8px 16px; }
    .bowler-row { display: flex; justify-content: space-between; }
    .bowler-name { font-size: 12px; color: #ccc; }
    .bowler-stat { font-size: 12px; color: rgba(255,255,255,0.5); }
    #status {
      padding: 10px 14px; text-align: center; font-size: 11px;
      color: rgba(255,255,255,0.45); display: none;
    }
    #status.error { color: #ff8a80; }
    #last-updated { padding: 4px 14px 6px; font-size: 10px; color: rgba(255,255,255,0.25); text-align: right; }
  </style>
</head>
<body>
<div id="card">
  <div id="header">
    <span class="left">LIVE SCORECARD</span>
    <span class="right">Refreshing in <span id="countdown">30</span>s</span>
  </div>
  <div id="match-title">Loading match...</div>
  <div id="status"></div>
  <div class="team-row" id="team1-row">
    <span class="team-name" id="team1-name">—</span>
    <span class="team-score" id="team1-score">—</span>
    <span class="team-overs" id="team1-overs"></span>
  </div>
  <div class="team-row" id="team2-row">
    <span class="team-name" id="team2-name">—</span>
    <span class="team-score" id="team2-score">—</span>
    <span class="team-overs" id="team2-overs"></span>
    <span id="live-badge"></span>
  </div>
  <div id="batsmen-section">
    <div class="section-label">At the crease</div>
    <div class="batsman-row">
      <span class="batsman-name strike" id="b1-name">—</span>
      <span class="batsman-stat" id="b1-stat"></span>
    </div>
    <div class="batsman-row">
      <span class="batsman-name" id="b2-name">—</span>
      <span class="batsman-stat" id="b2-stat"></span>
    </div>
  </div>
  <div id="bowler-section">
    <div class="section-label">Bowling</div>
    <div class="bowler-row">
      <span class="bowler-name" id="bowler-name">—</span>
      <span class="bowler-stat" id="bowler-stat"></span>
    </div>
  </div>
  <div id="last-updated"></div>
</div>

<script>
  // ╔══════════════════════════════════════════════════════╗
  // ║  UPDATE matchId and clubId before every match       ║
  // ╚══════════════════════════════════════════════════════╝
  const CRICCLUBS_URL = 'https://cricclubs.com/vlccl/viewScorecard.do?matchId=8023&clubId=146';
  const REFRESH_SECONDS = 30;

  const $ = id => document.getElementById(id);
  const countdown  = $('countdown');
  const statusEl   = $('status');
  const team1Row   = $('team1-row');
  const team2Row   = $('team2-row');
  const liveBadge  = $('live-badge');
  let secondsLeft  = REFRESH_SECONDS;

  // ── 3 proxies, tried in order until one works ──────────
  async function fetchViaProxy(targetUrl) {
    const proxies = [
      // Proxy 1: allorigins — returns JSON wrapper
      async () => {
        const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl), {cache:'no-store'});
        if (!r.ok) throw new Error('allorigins HTTP ' + r.status);
        const j = await r.json();
        if (!j.contents || j.contents.length < 500) throw new Error('allorigins empty');
        return j.contents;
      },
      // Proxy 2: corsproxy.io — returns raw HTML
      async () => {
        const r = await fetch('https://corsproxy.io/?url=' + encodeURIComponent(targetUrl), {cache:'no-store'});
        if (!r.ok) throw new Error('corsproxy HTTP ' + r.status);
        const t = await r.text();
        if (!t || t.length < 500) throw new Error('corsproxy empty');
        return t;
      },
      // Proxy 3: thingproxy — returns raw HTML
      async () => {
        const r = await fetch('https://thingproxy.freeboard.io/fetch/' + targetUrl, {cache:'no-store'});
        if (!r.ok) throw new Error('thingproxy HTTP ' + r.status);
        const t = await r.text();
        if (!t || t.length < 500) throw new Error('thingproxy empty');
        return t;
      }
    ];

    const errors = [];
    for (const proxy of proxies) {
      try { return await proxy(); }
      catch (e) { errors.push(e.message); }
    }
    throw new Error(errors.join(' / '));
  }

  // ── Helpers ─────────────────────────────────────────────
  function txt(el) { return el ? el.textContent.replace(/\s+/g,' ').trim() : ''; }

  function findFirst(doc, sels) {
    for (const s of sels) {
      try { const e = doc.querySelector(s); if (e) return e; } catch(_){}
    }
    return null;
  }

  function findAll(doc, sels) {
    for (const s of sels) {
      try { const a = [...doc.querySelectorAll(s)]; if (a.length) return a; } catch(_){}
    }
    return [];
  }

  // ── Main ────────────────────────────────────────────────
  async function fetchScores() {
    statusEl.style.display = 'block';
    statusEl.className = '';
    statusEl.textContent = 'Fetching...';

    try {
      const html = await fetchViaProxy(CRICCLUBS_URL);
      const doc  = new DOMParser().parseFromString(html, 'text/html');

      // Title
      const titleEl = findFirst(doc, ['h1','h2','.match-title','.matchTitle','title']);
      if (titleEl) {
        $('match-title').textContent = txt(titleEl)
          .replace(/CricClubs/gi,'').replace(/[|]/g,'').trim() || 'VLCCL Live Match';
      }

      // Team names
      const teamEls = findAll(doc, [
        '.team-name','.teamName','.innings-title',
        'table thead th:not(:empty)','.batting-team'
      ]);
      if (teamEls[0]) $('team1-name').textContent = txt(teamEls[0]) || 'Team 1';
      if (teamEls[1]) $('team2-name').textContent = txt(teamEls[1]) || 'Team 2';

      // Scores — regex scan entire body text
      const bodyText = doc.body ? (doc.body.innerText || doc.body.textContent) : '';
      const scoreMatches = [...bodyText.matchAll(/\b(\d{1,3})\/(\d{1,2})\b/g)];
      const oversMatches = [...bodyText.matchAll(/\((\d{1,2}(?:\.\d)?)\s*(?:Ov|ov|overs?)\)/g)];

      // Also try structured score elements
      const scoreEls = findAll(doc, [
        '.total-runs','.totalRuns','.innings-score','.score','.scoreTotal','.runs-wickets'
      ]);

      if (scoreEls.length >= 1) {
        $('team1-score').textContent = txt(scoreEls[0]);
      } else if (scoreMatches[0]) {
        $('team1-score').textContent = scoreMatches[0][1] + '/' + scoreMatches[0][2];
      }
      $('team1-overs').textContent = oversMatches[0] ? '(' + oversMatches[0][1] + ' ov)' : '';

      if (scoreEls.length >= 2) {
        $('team2-score').textContent = txt(scoreEls[1]);
      } else if (scoreMatches[1]) {
        $('team2-score').textContent = scoreMatches[1][1] + '/' + scoreMatches[1][2];
      }
      $('team2-overs').textContent = oversMatches[1] ? '(' + oversMatches[1][1] + ' ov)' : '';

      // Batting team highlight
      team2Row.classList.add('batting');
      team1Row.classList.remove('batting');
      liveBadge.innerHTML = '<span class="live-badge">LIVE</span>';

      // Batsmen
      const batEls = findAll(doc, [
        '.batsman-name','td.batsman','.batting-scorecard td:first-child',
        '.batting td.player-name'
      ]).filter(e => { const t = txt(e); return t.length > 2 && !/^(batsman|name|player|did not)/i.test(t); });

      if (batEls[0]) {
        $('b1-name').textContent = txt(batEls[0]);
        const row = batEls[0].closest('tr');
        const cells = row ? [...row.querySelectorAll('td')] : [];
        if (cells.length >= 3) $('b1-stat').textContent = txt(cells[1]) + '(' + txt(cells[2]) + ')';
      }
      if (batEls[1]) {
        $('b2-name').textContent = txt(batEls[1]);
        const row = batEls[1].closest('tr');
        const cells = row ? [...row.querySelectorAll('td')] : [];
        if (cells.length >= 3) $('b2-stat').textContent = txt(cells[1]) + '(' + txt(cells[2]) + ')';
      }

      // Bowler
      const bowlEls = findAll(doc, [
        '.bowler-name','td.bowler','.bowling-scorecard td:first-child',
        '.bowling td.player-name'
      ]).filter(e => { const t = txt(e); return t.length > 2 && !/^(bowler|name|player)/i.test(t); });

      if (bowlEls[0]) {
        $('bowler-name').textContent = txt(bowlEls[0]);
        const row = bowlEls[0].closest('tr');
        const cells = row ? [...row.querySelectorAll('td')] : [];
        if (cells.length >= 4) $('bowler-stat').textContent =
          txt(cells[1]) + '-' + txt(cells[2]) + '-' + txt(cells[3]);
      }

      statusEl.style.display = 'none';
      $('last-updated').textContent = 'Updated ' +
        new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

    } catch(err) {
      statusEl.className = 'error';
      statusEl.textContent = '⚠️ ' + err.message;
      statusEl.style.display = 'block';
      $('last-updated').textContent = 'Failed at ' +
        new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    }
  }

  fetchScores();
  setInterval(() => {
    countdown.textContent = --secondsLeft;
    if (secondsLeft <= 0) { secondsLeft = REFRESH_SECONDS; fetchScores(); }
  }, 1000);
</script>
</body>
</html>
